<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bosch Spotless banners</title>
    <style>
      :root {
        --bg: #f4f1eb;
        --panel: rgba(255, 255, 255, 0.88);
        --text: #1d1d1b;
        --muted: #5c5c57;
        --accent: #d5001c;
        --border: rgba(29, 29, 27, 0.12);
        --shadow: 0 20px 45px rgba(29, 29, 27, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(213, 0, 28, 0.08), transparent 28%),
          linear-gradient(135deg, #f6f2ec 0%, #ebe4d8 100%);
        min-height: 100vh;
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      .hero {
        padding: 28px 30px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 3vw, 3.2rem);
        line-height: 1;
        letter-spacing: -0.03em;
      }

      .intro {
        margin: 0;
        max-width: 60ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
        margin-top: 24px;
      }

      .card {
        display: block;
        padding: 20px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 14px 30px rgba(29, 29, 27, 0.08);
        color: inherit;
        text-decoration: none;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 36px rgba(29, 29, 27, 0.12);
        border-color: rgba(213, 0, 28, 0.28);
      }

      .card--missing {
        cursor: default;
        opacity: 0.72;
      }

      .card--missing:hover {
        transform: none;
        box-shadow: 0 14px 30px rgba(29, 29, 27, 0.08);
        border-color: var(--border);
      }

      .meta {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(213, 0, 28, 0.08);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .title {
        margin: 14px 0 6px;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .desc {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 0.96rem;
      }

      .footer-note {
        margin-top: 22px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 20px, 980px);
          padding-top: 24px;
          padding-bottom: 32px;
        }

        .hero {
          padding: 22px 18px;
          border-radius: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Bosch Spotless banners</h1>
        <p class="intro">
          Klicka för att öppna i ny flik. 

        <div class="grid">
          <a class="card" href="output/160x600_SE/index.html" target="_blank" rel="noopener noreferrer">
            <span class="meta">Svenska</span>
            <h2 class="title">160x600, svenska</h2>
          </a>

          <a class="card" href="output/160x600_DK/index.html" target="_blank" rel="noopener noreferrer">
            <span class="meta">Danska</span>
            <h2 class="title">160x600, danska</h2>

          </a>

          <a class="card" href="output/320x480_SE/index.html" target="_blank" rel="noopener noreferrer">
            <span class="meta">Svenska</span>
            <h2 class="title">320x480, svenska</h2>

          </a>

          <a class="card" href="output/320x480_DK/index.html" target="_blank" rel="noopener noreferrer">
            <span class="meta">Danska</span>
            <h2 class="title">320x480, danska</h2>

          </a>

          <a class="card" href="output/728x90_SE/index.html" target="_blank" rel="noopener noreferrer">
            <span class="meta">Svenska</span>
            <h2 class="title">728x90, svenska</h2>

          </a>

          <a class="card" href="output/728x90_DK/index.html" target="_blank" rel="noopener noreferrer">
            <span class="meta">Danska</span>
            <h2 class="title">728x90, danska</h2>
          </a>

          <a class="card" href="output/468x60_SE/index.html" target="_blank" rel="noopener noreferrer">
            <span class="meta">Svenska</span>
            <h2 class="title">468x60, svenska</h2>
          </a>

          <a class="card" href="output/468x60_DK/index.html" target="_blank" rel="noopener noreferrer">
            <span class="meta">Danska</span>
            <h2 class="title">468x60, danska</h2>
          </a>

          
        </div>


      </section>
    </main>
  </body>
</html>
