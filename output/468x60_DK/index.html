<!DOCTYPE html>
<html>
  <head>
    <meta name="ad.size" content="width=468,height=60">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bosch Spotless 468x60 DK</title>
    <style>
      body {
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <script type="text/javascript">
      var clickTag = "https://www.bosch-home.com/";
    </script>
    <script src="js/bannerAnimator.js"></script>
  </head>
  <body>
    <a href="javascript:void(window.open(clickTag))">
    <div class="M-B-BannerLeaderBoard">
          <img src="images/Logo-468x60.svg" class="M-B-BannerLeaderBoard__logo" alt="Bosch" />
          <div class="M-B-BannerLeaderBoard__content">
            <div class="M-B-BannerLeaderBoard__contentBlock">
              <div class="frame1-text">
                <div class="frame1-text__part frame1-text__part--top">
                  <img src="images/Text1-DK-468x60.svg" alt="Bosch robotstøvsuger. Stærk. Pålidelig. Gør arbejdet." />
                </div>
                <div class="frame1-text__part frame1-text__part--bottom" aria-hidden="true">
                  <img src="images/Text1-DK-468x60.svg" alt="" />
                </div>
              </div>
            </div>
            <div class="M-B-BannerLeaderBoard__contentBlock">
              <div class="frame2-text">
                <img class="text2-img" src="images/Text2-DK-468x60.svg" alt="Køb nu, test derhjemme." />
              </div>
              <div class="frame2-badge">
                <img src="images/MyBosch_100days_2023_DK_rgb.svg" alt="100 dage" />
              </div>
              <div class="frame2-cta">
                <img src="images/CTA-DK.svg" alt="Læs mere" />
              </div>
            </div>
          </div>
    </div>
    </a>
    <script>
      var bannerAnimator = new BannerAnimator();
    </script>
  </body>
</html>
