<!DOCTYPE html>
<html>
  <head>
    <meta name="ad.size" content="width=728,height=90">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bosch Spotless 728x90 SE</title>
    <style>
      html,
      body {
        margin: 0;
        width: 728px;
        height: 90px;
        overflow: hidden;
      }
    </style>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <script type="text/javascript">
      var clickTag = "https://www.bosch-home.com/";
    </script>
    <script src="js/bannerAnimator.js"></script>
  </head>
  <body>
    <a href="javascript:void(window.open(clickTag))">
    <div class="M-B-BannerLeaderBoard">
          <div class="M-B-BannerLeaderBoard__bg" style="background: url('images/Spotless-728x90.jpg') right center / 197px 90px no-repeat;"></div>
          <img src="images/Logo-728x90.svg" class="M-B-BannerLeaderBoard__logo" alt="Bosch" />
          <div class="M-B-BannerLeaderBoard__content">
            <div class="M-B-BannerLeaderBoard__contentBlock">
              <div class="frame1-text">
                <div class="frame1-text__part frame1-text__part--top">
                  <img src="images/Text1-SE-728x90.svg" alt="Bosch robotdammsugare. Stark. Pålitlig. Gör jobbet." />
                </div>
                <div class="frame1-text__part frame1-text__part--bottom" aria-hidden="true">
                  <img src="images/Text1-SE-728x90.svg" alt="" />
                </div>
              </div>
            </div>
            <div class="M-B-BannerLeaderBoard__contentBlock">
              <div class="frame2-text">
                <img class="text2-img" src="images/Text2-SE-728x90.svg" alt="Köp nu, testa hemma." />
              </div>
              <div class="frame2-badge">
                <img src="images/MyBosch_100days_2023_SE_rgb.svg" alt="100 dagar" />
              </div>
              <div class="frame2-cta">
                <img src="images/CTA-SE.svg" alt="Läs mer" />
              </div>
            </div>
          </div>
    </div>
    </a>
    <script>
      var bannerAnimator = new BannerAnimator();
    </script>
  </body>
</html>
