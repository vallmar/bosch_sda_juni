<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bosch Spotless 160x600 DK</title>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <script src="js/bannerAnimator.js"></script>
  </head>
  <body>
    <div class="M-B-BannerSkyscraper">
      <!-- Background image -->
      <div class="M-B-BannerSkyscraper__bg" style="background: url('images/Spotless-160x600.jpg') bottom center / cover no-repeat;"></div>

      <!-- Logo -->
      <img src="images/Logo-160x600.svg" class="M-B-BannerSkyscraper__logo" alt="Bosch" />

      <div class="M-B-BannerSkyscraper__content">

        <!-- Frame 1: Headline + Subline -->
        <div class="M-B-BannerSkyscraper__contentBlock">
          <div class="frame1-text">
            <img src="images/Text1-DK-160x600.svg" alt="Bosch robotstøvsugere. Stærk. Pålidelig. Klarer arbejdet." />
          </div>
        </div>

        <!-- Frame 2: CTA + 100 days badge -->
        <div class="M-B-BannerSkyscraper__contentBlock">
          <div class="frame2-text">
            <img class="text2-img" src="images/Text2-DK-160x600.svg" alt="Køb nu, test den derhjemme." />
          </div>
          <div class="frame2-cta">
            <img src="images/CTA-DK.svg" alt="Læs mere" />
          </div>
          <div class="frame2-badge">
            <img src="images/MyBosch_100days_2023_DK_rgb.svg" alt="100 dage" />
          </div>
        </div>

      </div>
    </div>

    <script>
      var bannerAnimator = new BannerAnimator();
    </script>
  </body>
</html>
