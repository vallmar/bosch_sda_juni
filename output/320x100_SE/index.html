<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8">
    <meta name="ad.size" content="width=320,height=100">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <title>Bosch 320x100 SE</title>
    <script type="text/javascript">
      var clickTag = "https://www.bosch-home.com/";
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/bannerAnimator.js" defer></script>
    <style>
      html,
      body {
        margin: 0;
        width: 320px;
        height: 100px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <a href="javascript:void(window.open(clickTag))">
      <div class="M-B-BannerLeaderBoard">
          <img class="M-B-BannerLeaderBoard__logo" src="images/Logo-320x100.svg" alt="">
        <div class="M-B-BannerLeaderBoard__content">
          <div class="M-B-BannerLeaderBoard__contentBlock">
            <div class="frame1-text">
              <div class="frame1-text__part frame1-text__part--top">
                <img src="images/Text1-SE-320x100.svg" alt="">
              </div>
              <div class="frame1-text__part frame1-text__part--bottom">
                <img src="images/Text1-SE-320x100.svg" alt="">
              </div>
            </div>
          </div>
          <div class="M-B-BannerLeaderBoard__contentBlock">
            <div class="frame2-text">
              <img class="text2-img" src="images/Text2-SE-320x100.svg" alt="">
            </div>
            <div class="frame2-badge">
              <img src="images/MyBosch_100days_2023_SE_rgb.svg" alt="10 års motorgaranti">
            </div>
            <div class="frame2-cta">
              <img src="images/CTA-SE.svg" alt="">
            </div>
          </div>
        </div>
      </div>
    </a>
  </body>
</html>
