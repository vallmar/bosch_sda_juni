<!DOCTYPE html>
<html>
  <head>
    <meta name="ad.size" content="width=320,height=480">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bosch Spotless 320x480 DK</title>
    <style>
      html,
      body {
        margin: 0;
        width: 320px;
        height: 480px;
        overflow: hidden;
      }
    </style>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <script type="text/javascript">
      var clickTag = "https://www.bosch-home.com/";
    </script>
    <script src="js/bannerAnimator.js"></script>
  </head>
  <body>
    <a href="javascript:void(window.open(clickTag))">
    <div class="M-B-BannerBillboard">
          <div class="M-B-BannerBillboard__bg" style="background: url('images/Spotless-320x480.jpg') bottom center / 320px 264px no-repeat;"></div>
          <img src="images/Logo-320x480.svg" class="M-B-BannerBillboard__logo" alt="Bosch" />
          <div class="M-B-BannerBillboard__content">
            <div class="M-B-BannerBillboard__contentBlock">
              <div class="frame1-text">
                <div class="frame1-text__part frame1-text__part--top">
                  <img src="images/Text1-DK-320x480.svg" alt="Bosch robotstøvsugere. Stærk. Pålidelig. Klarer arbejdet." />
                </div>
                <div class="frame1-text__part frame1-text__part--bottom" aria-hidden="true">
                  <img src="images/Text1-DK-320x480.svg" alt="" />
                </div>
              </div>
            </div>
            <div class="M-B-BannerBillboard__contentBlock">
              <div class="frame2-text">
                <img class="text2-img" src="images/Text2-DK-320x480.svg" alt="Køb nu, test den derhjemme." />
              </div>
              <div class="frame2-cta">
                <img src="images/CTA-DK.svg" alt="Læs mere" />
              </div>
              <div class="frame2-badge">
                <img src="images/MyBosch_100days_2023_DK_rgb.svg" alt="100 dage" />
              </div>
            </div>
          </div>
    </div>
    </a>
    <script>
      var bannerAnimator = new BannerAnimator();
    </script>
  </body>
</html>
